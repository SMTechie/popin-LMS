services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: popin
      POSTGRES_PASSWORD: popin
      POSTGRES_DB: popin_lms
    ports:
      - "5432:5432"
    volumes:
      - popin_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  popin_pg:
