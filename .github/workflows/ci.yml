name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: popin
          POSTGRES_PASSWORD: popin
          POSTGRES_DB: popin_lms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U popin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://popin:popin@localhost:5432/popin_lms
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_API_URL: http://localhost:4000
      JWT_SECRET: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install
        run: npm install
      - name: Prisma Generate
        run: npm --workspace apps/api run prisma:generate
      - name: Migrate
        run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t popin-lms-api:ci .
      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t popin-lms-web:ci .

  deploy-placeholder:
    runs-on: ubuntu-latest
    needs: [build-test, docker-build]
    steps:
      - name: Deploy
        run: |
          echo "Deploy step placeholder. Use SSH or registry pull." 
